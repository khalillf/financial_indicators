<div class="bg-gray-900 text-white w-64 min-h-screen p-4">
  <div *ngFor="let section of sections" class="mb-4">
    
    <!-- Titre de la section -->
    <div 
      class="flex items-center justify-between p-3 rounded-lg cursor-pointer bg-gray-900 hover:bg-gray-700 shadow-md transition-all duration-300"
      (click)="toggleSection(section)"
    >
      <div class="flex items-center gap-3">
        <i [class]="section.icon"></i>
        <span class="font-semibold">{{ section.label }}</span>
      </div>
      <i class="fa-solid" 
        [class.fa-chevron-down]="section.expanded" 
        [class.fa-chevron-right]="!section.expanded">
      </i>
    </div>

    <!-- Sous-menu avec animation -->
    <ul 
      [@expandCollapse]="section.expanded ? 'expanded' : 'collapsed'"
      class="bg-gray-900 mt-2 rounded-lg overflow-hidden"
    >
      <li *ngFor="let item of section.items">
        <a [routerLink]="item.route"
          class="block px-6 py-2 hover:bg-gray-700 flex items-center gap-3 transition-all duration-300 rounded-lg"
        >
          <i [class]="item.icon"></i>
          <span class="text-sm font-medium">{{ item.label }}</span>
        </a>
      </li>
    </ul>

  </div>
</div>
