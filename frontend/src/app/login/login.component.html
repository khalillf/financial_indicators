<div class="container flex h-screen overflow-hidden">
  <!-- Left Side -->
  <div class="left-side w-1/2 relative overflow-hidden">
    <img src="/assets/photo/cmr.jpeg" alt="Image d'entreprise" class="absolute inset-0 object-cover w-full h-full">
  </div>

  <!-- Right Side -->
  <div class="right-side w-1/2 flex items-center justify-center bg-white">
    <div class="login-box w-4/5 max-w-lg text-center p-6">
      <img src="/assets/photo/cmr.png" alt="Logo Entreprise" class="logo mx-auto mb-6 w-32 h-auto">
      <h2 class="text-2xl font-bold mb-6 text-gray-800">Connexion</h2>
      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Email Field -->
        <div>
          <input
            formControlName="email"
            type="email"
            placeholder="Email"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-150"
          />
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="text-red-500 text-sm mt-1">
            Email is required and must be valid
          </div>
        </div>

        <!-- Password Field -->
        <div>
          <input
            formControlName="password"
            type="password"
            placeholder="Mot de passe"
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400 transition duration-150"
          />
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-sm mt-1">
            Password is required
          </div>
        </div>

        <!-- Submit Button -->
        <button type="submit" class="w-full py-3 rounded-lg bg-blue-600 hover:bg-blue-700 text-white font-semibold transition duration-200">
          Se connecter
        </button>
      </form>

      <!-- Error Message -->
      <p *ngIf="errorMessage" id="error-message" class="text-red-500 mt-4">{{ errorMessage }}</p>
    </div>
  </div>
</div>
